spring.application.name=lostfound

# Database Configuration
# Uses Railway's MySQL plugin variables when present (MYSQLHOST, MYSQLPORT, etc.),
# falling back to local defaults for running on your own PC.
# NOTE: DB name and port changed from the original project's defaults so both
# copies can run on the same PC at the same time without conflicting.
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:lost_found_db_v2}?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:root}

# Hibernate / JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Server Port (Railway injects PORT; defaults to 8081 locally to avoid clashing
# with the original project running on 8080)
server.port=${PORT:8081}
